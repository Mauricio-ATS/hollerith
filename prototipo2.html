<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>Cartão Perfurado</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 350px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }

      select, button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
      }

      .card {
        margin-top: 20px;
        padding: 15px;
        background: #eee;
        border-radius: 8px;
        min-height: 80px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(20, 25px);
        gap: 5px;
        justify-content: center;
        margin: 20px 0;
      }

      .cell {
        width: 25px;
        height: 25px;
        border: 1px solid #333;
        border-radius: 50%;
      }

      .cell.perfurado {
        background: black;
        transform: scale(0.8);
      }

      .acoes {
        margin-top: 20px;
      }

      .acoes button {
        margin: 5px;
        padding: 10px;
      }

      .info-icon {
        cursor: pointer;
        font-size: 14px;
      }

      .info-icon:hover {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>

    <div id="menu" class="container">

      <h1>Simulador de Cartão Perfurado</h1>

      <select id="modo">
        <option value="">Selecione um modo</option>
        <option value="livre">Modo Livre</option>
        <option value="predefinido">Modo Pré-definido</option>
      </select>

      <div id="descricao" class="card"></div>

      <button id="iniciar" disabled>Iniciar</button>

    </div>

    <div id="sistema" style="display: none;">

      <h2 id="titulo-modo"></h2>

      <p>Cartão atual: <span id="numero-cartao">1</span></p>

      <div id="labels-colunas" style="display: grid; grid-template-columns: repeat(20, 25px); gap: 5px;"></div>

      <!-- GRID -->
      <div id="grid" class="grid"></div>

      <!-- BOTÕES -->
      <div class="acoes">
        <button id="addCartao">Adicionar cartão</button>
        <button id="lerCartoes">Ler cartões perfurados</button>
      </div>

    </div>

    <script>
      const seletorModo = document.getElementById("modo");
      const descricao = document.getElementById("descricao");
      const botao = document.getElementById("iniciar");

      let modoSelecionado = null;

      seletorModo.addEventListener("change", (e) => {
        modoSelecionado = e.target.value;

        if (!modoSelecionado) {
          descricao.textContent = "";
          botao.disabled = true;
          return;
        }

        botao.disabled = false;

        if (modoSelecionado === "livre") {
          descricao.innerHTML = `
            <strong>Modo Livre</strong><br>
            Você pode definir qualquer valor nas células e nas colunas<br>
            Através do botão direito do mouse.<br>
            Enquanto para perfurar ou desperfurar uma célula, basta clicar com o botão esquerdo.<br>
            Totalmente flexível.
          `;
        }

        if (modoSelecionado === "predefinido") {
          descricao.innerHTML = `
            <strong>Modo Pré-definido</strong><br>
            Cada coluna representa uma categoria (Sexo, Idade...).<br>
            Cada linha representa um valor fixo.<br>
            Para perfurar ou desperfurar uma célula, basta clicar com o botão esquerdo.<br>
            Inspirado no censo de 1890.
          `;
        }
      });

      const linhas = 12;
      const colunas = 20;

      const esquema = {
        0: { nome: "Sexo", valores: ["Masculino", "Feminino"] },
        1: { nome: "Estado Civil", valores: ["Solteiro", "Casado"] },
        2: { nome: "Idade", valores: ["0-20", "21-40", "41+"] },
        3: { nome: "Escolaridade", valores: ["Básica", "Média", "Superior"] }
      };

      // Array que guarda TODOS os cartões já salvos
      let listaCartoes = [];

      // Cartão em edição no momento
      let cartao = novoCartaoEmBranco();

      function novoCartaoEmBranco() {
        return Array.from({ length: linhas }, () =>
          Array.from({ length: colunas }, () => ({
            perfurado: false,
            valor: ""
          }))
        );
      }

      const grid = document.getElementById("grid");

      function renderizarGrid() {
        // Limpa o DOM e redesenha as células do cartão atual
        grid.innerHTML = "";

        for (let i = 0; i < linhas; i++) {
          for (let j = 0; j < colunas; j++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.linha = i;
            cell.dataset.coluna = j;

            if (cartao[i][j].perfurado) {
              cell.classList.add("perfurado");
            }

            cell.addEventListener("click", () => {
              alternarFuro(i, j, cell);
            });

            grid.appendChild(cell);
          }
        }
      }

      function renderizarLabels() {
        const container = document.getElementById("labels-colunas");
        container.innerHTML = "";

        for (let j = 0; j < colunas; j++) {
          const label = document.createElement("div");
          label.style.textAlign = "center";

          if (esquema[j]) {
            const info = document.createElement("span");
            info.textContent = "ℹ️";
            info.classList.add("info-icon");

            // tooltip nativo
            info.title = esquema[j].nome;

            label.appendChild(info);
          }

          container.appendChild(label);
        }
      }

      function alternarFuro(i, j, cell) {
        const jaPerfurado = cartao[i][j].perfurado; // estado ANTES

        if (modoSelecionado === "predefinido") {
          // limpa coluna inteira no array e visualmente
          for (let k = 0; k < linhas; k++) {
            cartao[k][j].perfurado = false;
          }
          atualizarColunaVisual(j);
        }

        // só perfura se não estava perfurado antes (permite "desligar" no predefinido)
        if (!jaPerfurado) {
          cartao[i][j].perfurado = true;
          cell.classList.add("perfurado");
        }
      }

      function atualizarColunaVisual(coluna) {
        document.querySelectorAll(".cell").forEach(cell => {
          if (parseInt(cell.dataset.coluna) === coluna) {
            cell.classList.remove("perfurado");
          }
        });
      }

      function lerCartaoPredefinido(cartao) {
        let resultado = {};

        for (let j = 0; j < colunas; j++) {
          const campo = esquema[j];
          if (!campo) continue;

          for (let i = 0; i < linhas; i++) {
            if (cartao[i][j].perfurado) {
              resultado[campo.nome] = campo.valores[i];
            }
          }
        }

        return resultado;
      }

      // --- ADICIONAR CARTÃO ---
      document.getElementById("addCartao").addEventListener("click", () => {
        // Salva uma cópia profunda do cartão atual na lista
        listaCartoes.push(JSON.parse(JSON.stringify(cartao)));

        // Cria um novo cartão em branco
        cartao = novoCartaoEmBranco();

        // Atualiza o contador e redesenha
        const numeroAtual = listaCartoes.length + 1;
        document.getElementById("numero-cartao").textContent = numeroAtual;

        renderizarGrid();

        console.log(`Cartão ${listaCartoes.length} salvo. Total de cartões: ${listaCartoes.length}`);
      });

      // --- LER CARTÕES ---
      document.getElementById("lerCartoes").addEventListener("click", () => {

        // inclui o cartão atual também (se tiver algo)
        const todos = [...listaCartoes];

        // opcional: incluir o atual se não estiver vazio
        if (!cartaoEstaVazio(cartao)) {
          todos.push(cartao);
        }

        if (todos.length === 0) {
          console.log("Nenhum cartão para ler.");
          return;
        }

        console.log("=== RESULTADO DOS CARTÕES ===");

        todos.forEach((c, index) => {
          let resultado;

          if (modoSelecionado === "predefinido") {
            resultado = lerCartaoPredefinido(c);
          } else {
            resultado = c; // modo livre (bruto por enquanto)
          }

          console.log(`Cartão ${index + 1}:`, resultado);
        });

      });

      function cartaoEstaVazio(cartao) {
        return cartao.every(linha =>
          linha.every(celula => !celula.perfurado)
        );
      }

      botao.addEventListener("click", () => {
        modoSelecionado = seletorModo.value;
        document.getElementById("menu").style.display = "none";
        document.getElementById("sistema").style.display = "block";
        document.getElementById("titulo-modo").textContent = "Modo: " + modoSelecionado;
        renderizarGrid();
        if (modoSelecionado === "predefinido") {
          renderizarLabels();
        }
      });
    </script>
  </body>
</html>
